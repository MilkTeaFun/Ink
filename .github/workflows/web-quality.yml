name: web-quality

on:
  pull_request:
    paths:
      - ".github/workflows/web-quality.yml"
      - ".github/workflows/dependency-review.yml"
      - ".github/dependabot.yml"
      - "Makefile"
      - "web/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-quality.yml"
      - ".github/workflows/dependency-review.yml"
      - ".github/dependabot.yml"
      - "Makefile"
      - "web/**"

concurrency:
  group: web-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm check
